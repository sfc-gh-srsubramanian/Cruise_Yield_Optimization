<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowSm" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#29B5E8" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#29B5E8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#29B5E8" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="#0f172a"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">The Transformation: From Fragmented to Unified Yield Management</text>
  <line x1="400" y1="64" x2="800" y2="64" stroke="#29B5E8" stroke-width="2" stroke-opacity="0.5"/>

  <!-- ===== LEFT COLUMN: BEFORE ===== -->
  <!-- Header -->
  <rect x="40" y="90" width="460" height="42" rx="8" fill="#FF6B6B" fill-opacity="0.12"/>
  <text x="270" y="118" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#FF6B6B">BEFORE</text>

  <!-- Scattered disconnected boxes -->
  <!-- Row 1 -->
  <g filter="url(#shadowSm)">
    <rect x="55" y="152" width="135" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  </g>
  <text x="122" y="182" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500" fill="#cbd5e1">Booking System</text>

  <g filter="url(#shadowSm)">
    <rect x="210" y="148" width="130" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  </g>
  <text x="275" y="178" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500" fill="#cbd5e1">Guest CRM</text>

  <g filter="url(#shadowSm)">
    <rect x="360" y="155" width="125" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  </g>
  <text x="422" y="185" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500" fill="#cbd5e1">Onboard POS</text>

  <!-- Row 2 -->
  <g filter="url(#shadowSm)">
    <rect x="70" y="222" width="120" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  </g>
  <text x="130" y="252" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500" fill="#cbd5e1">Loyalty DB</text>

  <g filter="url(#shadowSm)">
    <rect x="220" y="226" width="125" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  </g>
  <text x="282" y="256" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500" fill="#cbd5e1">Airline Data</text>

  <g filter="url(#shadowSm)">
    <rect x="370" y="220" width="120" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  </g>
  <text x="430" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="500" fill="#cbd5e1">Survey Tool</text>

  <!-- Disconnected dashes between boxes -->
  <line x1="190" y1="177" x2="210" y2="173" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="340" y1="173" x2="360" y2="180" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="190" y1="247" x2="220" y2="251" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="345" y1="251" x2="370" y2="245" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Before items with red X -->
  <!-- Item 1 -->
  <g transform="translate(60, 305)">
    <circle cx="12" cy="0" r="11" fill="#FF6B6B" fill-opacity="0.15"/>
    <text x="12" y="5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FF6B6B">✕</text>
    <text x="34" y="5" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#94a3b8">3–5 Day Analytics Cycle</text>
  </g>
  <!-- Item 2 -->
  <g transform="translate(60, 350)">
    <circle cx="12" cy="0" r="11" fill="#FF6B6B" fill-opacity="0.15"/>
    <text x="12" y="5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FF6B6B">✕</text>
    <text x="34" y="5" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#94a3b8">Partial Yield View</text>
  </g>
  <!-- Item 3 -->
  <g transform="translate(60, 395)">
    <circle cx="12" cy="0" r="11" fill="#FF6B6B" fill-opacity="0.15"/>
    <text x="12" y="5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FF6B6B">✕</text>
    <text x="34" y="5" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#94a3b8">One-Size-Fits-All Pricing</text>
  </g>

  <!-- ===== CENTER DIVIDER: Arrow ===== -->
  <!-- Vertical divider line -->
  <line x1="545" y1="90" x2="545" y2="450" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Large arrow -->
  <g filter="url(#shadowSm)">
    <rect x="520" y="470" width="160" height="56" rx="28" fill="#29B5E8" fill-opacity="0.12" stroke="#29B5E8" stroke-width="1.5"/>
  </g>
  <!-- Arrow shape -->
  <polygon points="538,498 620,498 620,486 650,498 620,510 620,498" fill="#29B5E8" opacity="0.0"/>
  <path d="M540,498 L630,498" stroke="#29B5E8" stroke-width="3" stroke-linecap="round"/>
  <polygon points="628,490 648,498 628,506" fill="#29B5E8"/>
  <!-- Snowflake text -->
  <text x="600" y="548" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#29B5E8">Snowflake</text>

  <!-- ===== RIGHT COLUMN: AFTER ===== -->
  <!-- Header -->
  <rect x="700" y="90" width="460" height="42" rx="8" fill="#30D158" fill-opacity="0.12"/>
  <text x="930" y="118" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#30D158">AFTER</text>

  <!-- Unified card -->
  <g filter="url(#shadow)">
    <rect x="720" y="150" width="420" height="120" rx="12" fill="#1e293b" stroke="#30D158" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>
  <text x="930" y="178" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#29B5E8" letter-spacing="1">CRUISE_YIELD_OPTIMIZATION</text>
  <!-- Pipeline stages -->
  <g transform="translate(930, 220)">
    <rect x="-190" y="-16" width="88" height="28" rx="6" fill="#29B5E8" fill-opacity="0.15"/>
    <text x="-146" y="-2" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#29B5E8">RAW</text>
    <!-- Arrow -->
    <text x="-94" y="1" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">→</text>
    <rect x="-82" y="-16" width="88" height="28" rx="6" fill="#29B5E8" fill-opacity="0.15"/>
    <text x="-38" y="-2" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#29B5E8">CURATED</text>
    <!-- Arrow -->
    <text x="14" y="1" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">→</text>
    <rect x="26" y="-16" width="88" height="28" rx="6" fill="#29B5E8" fill-opacity="0.15"/>
    <text x="70" y="-2" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#29B5E8">ANALYTICS</text>
    <!-- Arrow -->
    <text x="122" y="1" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">→</text>
    <rect x="134" y="-16" width="56" height="28" rx="6" fill="#30D158" fill-opacity="0.15"/>
    <text x="162" y="-2" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#30D158">ML</text>
  </g>

  <!-- After items with green checkmarks -->
  <!-- Item 1 -->
  <g transform="translate(740, 305)">
    <circle cx="12" cy="0" r="11" fill="#30D158" fill-opacity="0.15"/>
    <text x="12" y="5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#30D158">✓</text>
    <text x="34" y="5" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#cbd5e1">Real-Time Yield Analytics</text>
  </g>
  <!-- Item 2 -->
  <g transform="translate(740, 350)">
    <circle cx="12" cy="0" r="11" fill="#30D158" fill-opacity="0.15"/>
    <text x="12" y="5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#30D158">✓</text>
    <text x="34" y="5" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#cbd5e1">Guest 360 with Value Segmentation</text>
  </g>
  <!-- Item 3 -->
  <g transform="translate(740, 395)">
    <circle cx="12" cy="0" r="11" fill="#30D158" fill-opacity="0.15"/>
    <text x="12" y="5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#30D158">✓</text>
    <text x="34" y="5" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#cbd5e1">ML-Driven Personalized Pricing</text>
  </g>

  <!-- Connecting lines from left items to center, center to right items -->
  <!-- Left side dashed lines to center -->
  <line x1="330" y1="305" x2="520" y2="498" stroke="#FF6B6B" stroke-width="1" stroke-dasharray="4,4" stroke-opacity="0.25"/>
  <line x1="280" y1="350" x2="520" y2="498" stroke="#FF6B6B" stroke-width="1" stroke-dasharray="4,4" stroke-opacity="0.25"/>
  <line x1="310" y1="395" x2="520" y2="498" stroke="#FF6B6B" stroke-width="1" stroke-dasharray="4,4" stroke-opacity="0.25"/>
  <!-- Right side solid lines from center -->
  <line x1="680" y1="498" x2="740" y2="305" stroke="#30D158" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="680" y1="498" x2="740" y2="350" stroke="#30D158" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="680" y1="498" x2="740" y2="395" stroke="#30D158" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="694" width="1200" height="6" fill="#29B5E8" opacity="0.3"/>
</svg>